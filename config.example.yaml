# SAGA config.yaml v3.0 — .md Cache + DB + Letta Memory Block Edition

# === 서버 ===
server:
  host: "0.0.0.0"
  port: 8000
  api_key: ""  # Bearer 토큰 인증. 빈 문자열 = 인증 비활성화

# === 모델 설정 ===
models:
  narration: "claude-haiku-4-5-20251001"
  extraction: "gemini-2.5-flash-lite"
  curator: "claude-sonnet-4-5-20250929"
  embedding: "text-embedding-3-small"  # "local" → all-MiniLM-L6-v2

# === API 키 ===
api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  google: "${GOOGLE_API_KEY}"

# === 토큰 예산 ===
token_budget:
  total_context_max: 180000     # Anthropic 200K 기준 안전 마진 (~90%)
  dynamic_context_max: 4000     # SAGA 동적 컨텍스트 (state + episodes + lore)

# === .md 캐시 설정 ===
md_cache:
  enabled: true
  cache_dir: "cache/sessions"
  atomic_write: true

# === 프롬프트 캐싱 ===
prompt_caching:
  enabled: true
  strategy: "md_prefix"
  stabilize_system: true              # System message 안정화 (Lorebook 동적삽입 대응)
  canonical_similarity_threshold: 0.30 # Jaccard < 이 값이면 새 캐릭터로 판단 → canonical 교체
  cache_ttl: "1h"                     # extended-cache-ttl: "5m" (기본) or "1h"

# === 큐레이터 설정 (Letta) ===
curator:
  interval: 10
  enabled: true
  memory_block_schema:
    - narrative_summary
    - curation_decisions
    - contradiction_log
  compress_story_after_turns: 50
  letta_base_url: "http://localhost:8283"
  letta_model: "anthropic/claude-sonnet-4-5-20250929"
  letta_embedding: "openai/text-embedding-3-small"

# === 세션 ===
session:
  default_world: "my_world"

# === 캐시 워밍 (keepalive) ===
cache_warming:
  enabled: true
  interval: 270      # 초 (4.5분 — 5분 TTL 만료 직전 갱신)
  max_warmings: 4    # 세션당 최대 워밍 횟수

# === 상태 추적 인스트럭션 ===
state_instruction:
  enabled: true              # false로 설정 시 LLM에 state block 생성 지시 안 함 (Flash 추출로 대체)

# === LangSmith 트레이싱 ===
langsmith:
  enabled: false             # true로 설정 시 LLM 호출 자동 트레이싱. LANGSMITH_API_KEY 환경변수 필요
  project: "saga-risu"       # LangSmith 프로젝트 이름

